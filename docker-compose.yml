services:
  db:
    image: postgres:15-alpine
    container_name: pave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: one_click_away
    ports:
      - "5432:5432"
    volumes:
      - pave_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d one_click_away"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pave_pgdata:
