services:
  db:
    image: postgres:15-alpine
    container_name: pave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: one_click_away
    ports:
      - "5432:5432"
    volumes:
      - pave_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d one_click_away"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pave-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-development-only-secret-change-me}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/one_click_away?schema=public
      GOOGLE_MAPS_API_KEY_PUBLIC: ${GOOGLE_MAPS_API_KEY_PUBLIC:-}
      GOOGLE_MAPS_API_KEY_SERVER: ${GOOGLE_MAPS_API_KEY_SERVER:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID:-}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID:-}
      MOBILE_AUTH_JWT_SECRET: ${MOBILE_AUTH_JWT_SECRET:-}
      MOBILE_ACCESS_TOKEN_TTL_MINUTES: ${MOBILE_ACCESS_TOKEN_TTL_MINUTES:-15}
      MOBILE_REFRESH_TOKEN_TTL_DAYS: ${MOBILE_REFRESH_TOKEN_TTL_DAYS:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_RESPONSES_MODEL: ${OPENAI_RESPONSES_MODEL:-gpt-4.1-mini}
      OPENAI_VECTOR_STORE_ID: ${OPENAI_VECTOR_STORE_ID:-}
      ENABLE_AI_CREATE: ${ENABLE_AI_CREATE:-false}
      NEXT_PUBLIC_ENABLE_AI_CREATE: ${NEXT_PUBLIC_ENABLE_AI_CREATE:-false}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@pave.app}
      DEEP_LINK_BASE_URL: ${DEEP_LINK_BASE_URL:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-60}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      USE_MOCK_PLACES_PROVIDER: ${USE_MOCK_PLACES_PROVIDER:-false}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  pave_pgdata:
