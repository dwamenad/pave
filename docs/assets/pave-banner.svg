    <text x="132" y="334" fill="#0F172A" font-size="76" font-family="Inter, Arial, sans-serif" font-weight="800">Pave</text>
    <text x="132" y="398" fill="#334155" font-size="31" font-family="Inter, Arial, sans-serif" font-weight="500">Turns saved travel chaos into editable itineraries,</text>
    <text x="132" y="442" fill="#334155" font-size="31" font-family="Inter, Arial, sans-serif" font-weight="500">then gives those itineraries a social life.</text>

