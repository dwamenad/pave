    <text x="1104" y="426" fill="#334155" font-size="14" font-family="Inter, Arial, sans-serif">Comments + saves</text>
    <text x="1104" y="448" fill="#334155" font-size="14" font-family="Inter, Arial, sans-serif">Remix lineage</text>

